<div class="product-purchase-box">
  <div class="product-option-group">
    <label for="productVariantSelect">Choose Variant</label>
    <select id="productVariantSelect"></select>
  </div>

  <div class="product-option-group">
    <label>Quantity</label>
    <div class="product-qty-wrap">
      <button type="button" class="product-qty-btn" id="qtyMinus">−</button>
      <input type="number" id="productQty" min="1" value="1" />
      <button type="button" class="product-qty-btn" id="qtyPlus">+</button>
    </div>
  </div>

  <button class="product-add-btn" id="productAddToCart" type="button">
    Add To Cart
  </button>

  <div class="product-conversion-note">
    <i class="fa-solid fa-shield-halved"></i>
    <span>Secure checkout and premium storefront support.</span>
  </div>
</div>
