<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Axiom Peptides</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../footer/footer.css">
<link rel="stylesheet" href="checkout.css">

</head>

<body class="checkout-page">

<header class="checkout-header">

<a href="../index.html" class="checkout-logo">
<img src="../images/axiom-menu-logo.PNG">
</a>

</header>


<main class="checkout-main">

<div class="checkout-container">

<!-- LEFT SIDE -->
<section class="checkout-form">

<h1>Checkout</h1>

<form id="checkoutForm">

<!-- CONTACT -->
<div class="checkout-section">

<h2>Contact</h2>

<input type="email" placeholder="Email Address" required>

</div>


<!-- SHIPPING -->
<div class="checkout-section">

<h2>Shipping Address</h2>

<input type="text" placeholder="First Name" required>
<input type="text" placeholder="Last Name" required>

<input type="text" placeholder="Address" required>
<input type="text" placeholder="Apartment / Suite">

<input type="text" placeholder="City" required>
<input type="text" placeholder="State" required>
<input type="text" placeholder="ZIP Code" required>

<input type="tel" placeholder="Phone Number" required>

</div>


<!-- SHIPPING RATES -->
<div class="checkout-section">

<h2>Shipping Method</h2>

<div id="shippingRates">

<button type="button" id="getRates">

Get Live USPS Rates

</button>

</div>

</div>


<!-- PAYMENT METHODS LOAD HERE -->
<div id="payment-methods"></div>


<button type="submit" class="checkout-button">

Place Order

</button>

</form>

</section>


<!-- ORDER SUMMARY -->
<aside class="checkout-summary">

<h2>Order Summary</h2>

<div id="checkoutItems"></div>

<div class="checkout-total">

<div>
<span>Subtotal</span>
<strong id="subtotal">$0.00</strong>
</div>

<div>
<span>Shipping</span>
<strong id="shipping">$0.00</strong>
</div>

<div class="total">
<span>Total</span>
<strong id="total">$0.00</strong>
</div>

</div>

</aside>

</div>

</main>


<div id="site-footer"></div>

<script src="../js/cart.js"></script>
<script src="../footer/footer-loader.js"></script>
<script src="checkout.js"></script>

</body>
</html>
