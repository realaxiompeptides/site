<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Checkout | Axiom Peptides</title>
  <meta
    name="description"
    content="Secure checkout for Axiom Peptides orders."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../footer/footer.css" />
  <link rel="stylesheet" href="checkout.css" />
  <link rel="stylesheet" href="checkout-shipping.css" />
  <link rel="stylesheet" href="checkout-payment.css" />
  <link rel="stylesheet" href="checkout-terms.css" />
</head>

<body class="checkout-page">

  <header class="checkout-header">
    <div class="checkout-header-inner">
      <a href="../index.html" class="checkout-logo" aria-label="Axiom Peptides home">
        <img src="../images/axiom-menu-logo.PNG" alt="Axiom Peptides logo" />
      </a>

      <a href="../cart/cart-page.html" class="checkout-cart-link" aria-label="Go to cart">
        <span class="checkout-cart-icon-wrap">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="checkout-cart-count" id="checkoutCartCount">0</span>
        </span>
      </a>
    </div>
  </header>

  <main class="checkout-main">
    <div class="checkout-container">

      <div class="checkout-page-heading">
        <h1 class="checkout-page-title">Checkout</h1>
      </div>

      <div class="checkout-layout">
        <section class="checkout-form-wrap">
          <div class="checkout-card">
            <form id="checkoutForm" novalidate>

              <section class="checkout-section">
                <h2 class="checkout-section-title">Contact</h2>

                <div class="checkout-field-group">
                  <input
                    class="checkout-input"
                    type="email"
                    id="checkoutEmail"
                    name="email"
                    placeholder="Email Address"
                    autocomplete="email"
                    required
                  />
                </div>
              </section>

              <section class="checkout-section">
                <h2 class="checkout-section-title">Shipping Address</h2>

                <div class="checkout-grid two-col">
                  <input
                    class="checkout-input"
                    type="text"
                    id="firstName"
                    name="firstName"
                    placeholder="First Name"
                    autocomplete="given-name"
                    required
                  />

                  <input
                    class="checkout-input"
                    type="text"
                    id="lastName"
                    name="lastName"
                    placeholder="Last Name"
                    autocomplete="family-name"
                    required
                  />

                  <input
                    class="checkout-input checkout-span-2"
                    type="text"
                    id="address1"
                    name="address1"
                    placeholder="Street Address"
                    autocomplete="address-line1"
                    required
                  />

                  <input
                    class="checkout-input checkout-span-2"
                    type="text"
                    id="address2"
                    name="address2"
                    placeholder="Apartment / Suite (Optional)"
                    autocomplete="address-line2"
                  />

                  <input
                    class="checkout-input"
                    type="text"
                    id="city"
                    name="city"
                    placeholder="City"
                    autocomplete="address-level2"
                    required
                  />

                  <input
                    class="checkout-input"
                    type="text"
                    id="state"
                    name="state"
                    placeholder="State"
                    autocomplete="address-level1"
                    required
                  />

                  <input
                    class="checkout-input"
                    type="text"
                    id="zip"
                    name="zip"
                    placeholder="ZIP Code"
                    autocomplete="postal-code"
                    required
                  />

                  <input
                    class="checkout-input"
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="Phone Number"
                    autocomplete="tel"
                    required
                  />

                  <input
                    class="checkout-input checkout-span-2"
                    type="text"
                    id="country"
                    name="country"
                    placeholder="Country"
                    autocomplete="country-name"
                    value="US"
                  />
                </div>
              </section>

              <section class="checkout-section">
                <h2 class="checkout-section-title">Shipping Method</h2>

                <div class="shipping-box">
                  <button
                    type="button"
                    id="getRates"
                    class="shipping-button"
                  >
                    Get Live USPS Rates
                  </button>

                  <p class="shipping-help-text">
                    Enter your shipping address, then choose a shipping method.
                  </p>

                  <div id="shippingRates" class="shipping-rates"></div>
                </div>
              </section>

              <div id="payment-methods"></div>

              <section class="checkout-section">
                <div class="checkout-summary-card">
                  <h2 class="checkout-section-title">Order Summary</h2>

                  <div id="checkoutItems" class="checkout-items"></div>

                  <div class="checkout-total">
                    <div class="checkout-total-row">
                      <span>Subtotal</span>
                      <strong id="subtotal">$0.00</strong>
                    </div>

                    <div class="checkout-total-row">
                      <span>Shipping</span>
                      <strong id="shipping">$0.00</strong>
                    </div>

                    <div class="checkout-total-row">
                      <span>Tax</span>
                      <strong id="tax">$0.00</strong>
                    </div>

                    <div class="checkout-total-row total">
                      <span>Total</span>
                      <strong id="total">$0.00</strong>
                    </div>
                  </div>
                </div>
              </section>

              <div id="termsSection"></div>

              <section class="checkout-section checkout-submit-section">
                <button type="submit" class="checkout-button">
                  Place Order
                </button>
              </section>

            </form>
          </div>
        </section>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const footerTarget = document.getElementById("site-footer");
      if (!footerTarget) return;

      fetch("../footer/footer.html")
        .then(function (response) {
          if (!response.ok) {
            throw new Error("Could not load ../footer/footer.html");
          }
          return response.text();
        })
        .then(function (html) {
          footerTarget.innerHTML = html;
        })
        .catch(function (error) {
          console.error("Footer load failed:", error);
        });
    });
  </script>

  <<!-- Tracking + Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../admin-dashboard/dashboard-config.js" defer></script>
<script src="../admin-dashboard/shared/tracking-config.js" defer></script>
<script src="../admin-dashboard/shared/helpers.js" defer></script>
<script src="../admin-dashboard/supabase-client.js" defer></script>
<script src="../admin-dashboard/visitor-session.js" defer></script>
<script src="../admin-dashboard/cart-session/cart-session.js" defer></script>

<!-- Shared cart/session sync -->
<script src="../cart/cart-checkout-sync.js" defer></script>

<!-- Checkout session + order creation -->
<script src="checkout-session.js" defer></script>
<script src="../admin-dashboard/checkout-session/checkout-tracking.js" defer></script>
<script src="../admin-dashboard/orders/order-submit.js" defer></script>
<script src="../admin-dashboard/orders/checkout-order-submit.js" defer></script>

<!-- Checkout UI -->
<script src="checkout.js" defer></script>
</body>
</html>
