<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Axiom Peptides</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../footer/footer.css">
<link rel="stylesheet" href="checkout.css">

</head>

<body class="checkout-page">

<!-- Header -->
<header class="checkout-header">

<div class="checkout-header-inner">

<a href="../index.html" class="checkout-logo">
<img src="../images/axiom-menu-logo.PNG" alt="Axiom Peptides">
</a>

<div class="checkout-security">
<i class="fa-solid fa-lock"></i>
Secure Checkout
</div>

</div>

</header>


<main class="checkout-main">

<div class="checkout-container">

<!-- LEFT SIDE -->
<section class="checkout-form">

<h1>Checkout</h1>

<form id="checkoutForm">

<!-- Contact -->
<div class="checkout-section">

<h2>Contact</h2>

<input
type="email"
placeholder="Email Address"
required
id="email"
/>

</div>


<!-- Shipping -->
<div class="checkout-section">

<h2>Shipping Address</h2>

<div class="two-col">

<input
type="text"
placeholder="First Name"
required
id="firstName"
/>

<input
type="text"
placeholder="Last Name"
required
id="lastName"
/>

</div>

<input
type="text"
placeholder="Address"
required
id="address"
/>

<input
type="text"
placeholder="Apartment / Suite"
/>

<div class="two-col">

<input
type="text"
placeholder="City"
required
id="city"
/>

<input
type="text"
placeholder="State"
required
id="state"
/>

</div>

<input
type="text"
placeholder="ZIP Code"
required
id="zip"
/>

<input
type="tel"
placeholder="Phone"
required
id="phone"
/>

</div>


<!-- Shipping Method -->
<div class="checkout-section">

<h2>Shipping</h2>

<div id="shippingRates">

<button
type="button"
class="get-rates-btn"
id="getRates"
>
Get Live USPS Rates
</button>

<div id="ratesContainer">

<p class="rates-placeholder">
Enter address and click "Get Rates"
</p>

</div>

</div>

</div>


<!-- Payment -->
<div class="checkout-section">

<h2>Payment</h2>

<input
type="text"
placeholder="Card Number"
required
/>

<div class="two-col">

<input
type="text"
placeholder="MM / YY"
required
/>

<input
type="text"
placeholder="CVC"
required
/>

</div>

<input
type="text"
placeholder="Name on Card"
required
/>

</div>


<button
type="submit"
class="checkout-button"
>
Place Order
</button>

</form>

</section>


<!-- RIGHT SIDE ORDER SUMMARY -->
<aside class="checkout-summary">

<h2>Order Summary</h2>

<div id="checkoutItems"></div>

<div class="checkout-total">

<div class="row">
<span>Subtotal</span>
<strong id="checkoutSubtotal">$0.00</strong>
</div>

<div class="row">
<span>Shipping</span>
<strong id="checkoutShipping">$0.00</strong>
</div>

<div class="row total">
<span>Total</span>
<strong id="checkoutTotal">$0.00</strong>
</div>

</div>

</aside>

</div>

</main>


<!-- Footer -->
<div id="site-footer"></div>

<script src="../js/cart.js"></script>
<script src="../footer/footer-loader.js"></script>
<script src="checkout.js"></script>

</body>
</html>
