<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Shop All | Axiom Peptides</title>
  <meta
    name="description"
    content="Browse all Axiom Peptides products with clean filtering, sorting, and a premium storefront experience."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/menu.css" />
  <link rel="stylesheet" href="css/cart.css" />
  <link rel="stylesheet" href="css/catalog.css" />
  <link rel="stylesheet" href="footer/footer.css" />

  <!-- add these if these are your actual component files -->
  <link rel="stylesheet" href="announcement/announcement-bar.css" />
  <link rel="stylesheet" href="header/header.css" />
</head>
<body class="catalog-body">

  <!-- announcement bar mount -->
  <div id="site-announcement"></div>

  <!-- header mount -->
  <div id="site-header"></div>

  <main class="catalog-page">
    <div class="container">

      <nav class="catalog-breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Home</a>
        <span>/</span>
        <strong>Shop All</strong>
      </nav>

      <h1 class="catalog-title">Shop All Products</h1>

      <div class="catalog-controls">
        <button class="filter-toggle" type="button" aria-controls="catalogSidebar" aria-expanded="false">
          <i class="fa-solid fa-sliders"></i>
          <span>Filters</span>
        </button>

        <select class="catalog-sort" id="sortProducts" aria-label="Sort products">
          <option value="featured">Featured</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="newest">Newest</option>
        </select>
      </div>

      <div class="catalog-layout">
        <aside class="catalog-sidebar" id="catalogSidebar">
          <h3>Categories</h3>

          <label>
            <input type="checkbox" value="peptides" />
            <span>Peptides</span>
          </label>

          <label>
            <input type="checkbox" value="fat-loss" />
            <span>Fat Loss</span>
          </label>

          <label>
            <input type="checkbox" value="research" />
            <span>Research Compounds</span>
          </label>

          <label>
            <input type="checkbox" value="supplies" />
            <span>Supplies</span>
          </label>

          <h3>Price</h3>
          <input type="range" id="priceRange" min="0" max="300" value="300" />

          <h3>Availability</h3>
          <label>
            <input type="checkbox" id="inStockOnly" />
            <span>In Stock</span>
          </label>
        </aside>

        <section class="catalog-results">
          <div class="catalog-grid" id="catalogGrid"></div>
        </section>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <!-- component loaders -->
  <script src="announcement/announcement-loader.js" defer></script>
  <script src="header/header-loader.js" defer></script>

  <!-- catalog logic -->
  <script src="js/catalog.js" defer></script>

  <!-- footer -->
  <script src="footer/footer-loader.js" defer></script>
</body>
</html>
