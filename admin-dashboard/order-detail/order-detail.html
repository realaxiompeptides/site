<div id="orderDetailPanel" class="dashboard-details-grid" hidden>
  <div class="dashboard-card dashboard-span-2">
    <div class="dashboard-card-header">
      <h3>Order Details</h3>

      <button
        type="button"
        class="dashboard-btn dashboard-btn-secondary"
        id="orderDetailBackBtn"
      >
        Back to Orders
      </button>
    </div>

    <div class="dashboard-info-list">
      <div class="dashboard-info-row">
        <span>Order Number</span>
        <strong id="orderDetailNumber">—</strong>
      </div>

      <div class="dashboard-info-row">
        <span>Status</span>
        <strong id="orderDetailStatus">—</strong>
      </div>

      <div class="dashboard-info-row">
        <span>Payment Status</span>
        <strong id="orderDetailPaymentStatus">—</strong>
      </div>

      <div class="dashboard-info-row">
        <span>Fulfillment Status</span>
        <strong id="orderDetailFulfillmentStatus">—</strong>
      </div>

      <div class="dashboard-info-row">
        <span>Email</span>
        <strong id="orderDetailEmail">—</strong>
      </div>

      <div class="dashboard-info-row">
        <span>Phone</span>
        <strong id="orderDetailPhone">—</strong>
      </div>

      <div class="dashboard-info-row">
        <span>Created</span>
        <strong id="orderDetailCreated">—</strong>
      </div>

      <div class="dashboard-info-row">
        <span>Subtotal</span>
        <strong id="orderDetailSubtotal">—</strong>
      </div>

      <div class="dashboard-info-row">
        <span>Shipping</span>
        <strong id="orderDetailShipping">—</strong>
      </div>

      <div class="dashboard-info-row">
        <span>Tax</span>
        <strong id="orderDetailTax">—</strong>
      </div>

      <div class="dashboard-info-row">
        <span>Total</span>
        <strong id="orderDetailTotal">—</strong>
      </div>
    </div>
  </div>

  <div class="dashboard-card dashboard-span-2">
    <div class="dashboard-card-header">
      <h3>Order Actions</h3>
    </div>

    <div class="dashboard-action-list">
      <button
        type="button"
        class="dashboard-btn dashboard-btn-secondary"
        id="fulfillOrderBtn"
      >
        Fulfill Order
      </button>

      <button
        type="button"
        class="dashboard-btn dashboard-btn-secondary"
        id="markShippedBtn"
      >
        Mark Shipped
      </button>
    </div>
  </div>

  <div class="dashboard-card">
    <div class="dashboard-card-header">
      <h3>Customer Shipping</h3>
    </div>
    <div id="orderDetailShippingAddress">—</div>
  </div>

  <div class="dashboard-card">
    <div class="dashboard-card-header">
      <h3>Customer Billing</h3>
    </div>
    <div id="orderDetailBillingAddress">—</div>
  </div>

  <div class="dashboard-card dashboard-span-2">
    <div class="dashboard-card-header">
      <h3>Order Items</h3>
    </div>
    <div id="orderDetailItemsWrap" class="dashboard-items-wrap">
      <div class="dashboard-empty">No items found.</div>
    </div>
  </div>
</div>
