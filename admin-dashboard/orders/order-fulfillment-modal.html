<div class="dashboard-modal" id="orderFulfillmentModal" hidden aria-hidden="true">
  <div class="dashboard-modal-backdrop" data-modal-close="true"></div>

  <div class="dashboard-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="orderFulfillmentTitle">
    <button
      type="button"
      class="dashboard-modal-close"
      id="orderFulfillmentCloseBtn"
      aria-label="Close fulfillment modal"
    >
      &times;
    </button>

    <div class="dashboard-modal-content">

      <!-- FULFILL ORDER STEP -->
      <div id="fulfillmentStep" hidden>
        <div class="dashboard-modal-header">
          <p class="dashboard-kicker">Order Action</p>
          <h3 id="orderFulfillmentTitle">Fulfill Order</h3>
        </div>

        <p class="dashboard-modal-copy">How did the customer pay?</p>

        <div class="dashboard-payment-method-grid">
          <button type="button" class="dashboard-pill-option" data-payment-method="Cash App">Cash App</button>
          <button type="button" class="dashboard-pill-option" data-payment-method="Crypto">Crypto</button>
          <button type="button" class="dashboard-pill-option" data-payment-method="Credit / Debit Card">Credit / Debit Card</button>
          <button type="button" class="dashboard-pill-option" data-payment-method="Venmo">Venmo</button>
          <button type="button" class="dashboard-pill-option" data-payment-method="Zelle">Zelle</button>
          <button type="button" class="dashboard-pill-option" data-payment-method="Bank Transfer">Bank Transfer</button>
        </div>

        <div class="dashboard-modal-status" id="fulfillmentStatusMessage"></div>
      </div>

      <!-- MARK SHIPPED STEP -->
      <div id="shippedStep" hidden>
        <div class="dashboard-modal-header">
          <p class="dashboard-kicker">Order Action</p>
          <h3>Mark Order Shipped</h3>
        </div>

        <div class="dashboard-form-stack">
          <div class="dashboard-form-group">
            <label for="shipmentTrackingNumber">Tracking Number</label>
            <input
              type="text"
              id="shipmentTrackingNumber"
              class="dashboard-input"
              placeholder="Enter tracking number"
            />
          </div>

          <div class="dashboard-form-group">
            <label for="shipmentTrackingUrl">Tracking URL</label>
            <input
              type="text"
              id="shipmentTrackingUrl"
              class="dashboard-input"
              placeholder="Enter tracking URL"
            />
          </div>
        </div>

        <div class="dashboard-modal-actions">
          <button
            type="button"
            class="dashboard-btn dashboard-btn-primary"
            id="saveShipmentBtn"
          >
            Save Shipment
          </button>

          <button
            type="button"
            class="dashboard-btn dashboard-btn-secondary"
            id="cancelShipmentBtn"
          >
            Cancel
          </button>
        </div>

        <div class="dashboard-modal-status" id="shipmentStatusMessage"></div>
      </div>

    </div>
  </div>
</div>
