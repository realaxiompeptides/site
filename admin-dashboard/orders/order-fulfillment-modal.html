<div class="order-modal-overlay" id="orderFulfillmentModalOverlay" hidden>
  <div
    class="order-modal-card"
    id="orderFulfillmentModalCard"
    role="dialog"
    aria-modal="true"
    aria-labelledby="orderFulfillmentModalTitle"
  >
    <button
      type="button"
      class="order-modal-close"
      id="orderFulfillmentModalClose"
      aria-label="Close order action modal"
    >
      &times;
    </button>

    <p class="order-modal-kicker" id="orderFulfillmentModalKicker">ORDER ACTION</p>
    <h2 class="order-modal-title" id="orderFulfillmentModalTitle">Fulfill Order</h2>

    <div class="order-modal-body">
      <!-- FULFILL STEP -->
      <div id="fulfillmentPaymentStep">
        <p class="order-modal-label">How did the customer pay?</p>

        <div class="order-payment-grid">
          <button type="button" class="order-payment-option" data-payment-method="Cash App">Cash App</button>
          <button type="button" class="order-payment-option" data-payment-method="Crypto">Crypto</button>
          <button type="button" class="order-payment-option" data-payment-method="Credit / Debit Card">Credit / Debit Card</button>
          <button type="button" class="order-payment-option" data-payment-method="Venmo">Venmo</button>
          <button type="button" class="order-payment-option" data-payment-method="Zelle">Zelle</button>
          <button type="button" class="order-payment-option" data-payment-method="Bank Transfer">Bank Transfer</button>
        </div>
      </div>

      <!-- SHIPPED STEP -->
      <div id="shipmentFieldsStep" hidden>
        <div class="order-modal-field-group">
          <label class="order-modal-field-label" for="shipmentCarrierInput">Carrier</label>
          <input
            id="shipmentCarrierInput"
            class="order-modal-input"
            type="text"
            placeholder="USPS, UPS, FedEx"
          />
        </div>

        <div class="order-modal-field-group">
          <label class="order-modal-field-label" for="shipmentServiceInput">Shipping Service</label>
          <input
            id="shipmentServiceInput"
            class="order-modal-input"
            type="text"
            placeholder="Ground Advantage, Priority Mail"
          />
        </div>

        <div class="order-modal-field-group">
          <label class="order-modal-field-label" for="shipmentTrackingNumberInput">Tracking Number</label>
          <input
            id="shipmentTrackingNumberInput"
            class="order-modal-input"
            type="text"
            placeholder="Enter tracking number"
          />
        </div>

        <div class="order-modal-field-group">
          <label class="order-modal-field-label" for="shipmentTrackingUrlInput">Tracking URL</label>
          <input
            id="shipmentTrackingUrlInput"
            class="order-modal-input"
            type="url"
            placeholder="Enter tracking URL"
          />
        </div>

        <div class="order-modal-action-stack">
          <button
            type="button"
            class="dashboard-btn dashboard-btn-secondary"
            id="buyShippingLabelBtn"
          >
            Buy Shipping Label
          </button>

          <button
            type="button"
            class="dashboard-btn dashboard-btn-primary"
            id="saveShipmentBtn"
          >
            Save Shipment
          </button>

          <button
            type="button"
            class="dashboard-btn dashboard-btn-secondary"
            id="cancelShipmentBtn"
          >
            Cancel
          </button>
        </div>
      </div>

      <!-- SHIPMENT SAVED STEP -->
      <div id="shipmentSavedStep" hidden>
        <div class="order-modal-field-group">
          <label class="order-modal-field-label">Carrier</label>
          <div class="order-modal-readonly" id="savedShipmentCarrier">—</div>
        </div>

        <div class="order-modal-field-group">
          <label class="order-modal-field-label">Shipping Service</label>
          <div class="order-modal-readonly" id="savedShipmentService">—</div>
        </div>

        <div class="order-modal-field-group">
          <label class="order-modal-field-label">Tracking Number</label>
          <div class="order-modal-readonly order-modal-readonly-row">
            <span id="savedShipmentTrackingNumber">—</span>
            <button
              type="button"
              class="dashboard-btn dashboard-btn-secondary order-modal-copy-btn"
              id="copyTrackingNumberBtn"
            >
              Copy
            </button>
          </div>
        </div>

        <div class="order-modal-field-group">
          <label class="order-modal-field-label">Tracking URL</label>
          <div class="order-modal-readonly order-modal-readonly-row">
            <a
              href="#"
              id="savedShipmentTrackingUrl"
              target="_blank"
              rel="noopener noreferrer"
            >
              —
            </a>
            <button
              type="button"
              class="dashboard-btn dashboard-btn-secondary order-modal-copy-btn"
              id="copyTrackingUrlBtn"
            >
              Copy
            </button>
          </div>
        </div>

        <div class="order-modal-action-stack">
          <button
            type="button"
            class="dashboard-btn dashboard-btn-primary"
            id="closeShipmentSavedBtn"
          >
            Done
          </button>
        </div>
      </div>

      <p class="order-modal-error" id="orderFulfillmentModalError" hidden></p>
      <p class="order-modal-success" id="orderFulfillmentModalSuccess" hidden></p>
    </div>
  </div>
</div>
