<section class="affiliate-card" id="affiliateDashboardWrap" hidden>
  <div class="affiliate-overview-top">
    <div>
      <p class="affiliate-overview-kicker">Affiliate Dashboard</p>
      <h2 class="affiliate-section-title" id="affiliateDashboardEmail">—</h2>
      <p class="affiliate-muted">
        Status: <strong id="affiliateDashboardStatus">pending</strong>
      </p>
    </div>

    <button type="button" class="affiliate-btn affiliate-btn-secondary" id="affiliateLogoutBtn">
      Log Out
    </button>
  </div>

  <div class="affiliate-grid-3 affiliate-overview-stats">
    <div class="affiliate-stat-card">
      <p class="affiliate-stat-label">Clicks</p>
      <p class="affiliate-stat-value" id="affiliateClicksCount">0</p>
    </div>

    <div class="affiliate-stat-card">
      <p class="affiliate-stat-label">Conversions</p>
      <p class="affiliate-stat-value" id="affiliateConversionsCount">0</p>
    </div>

    <div class="affiliate-stat-card">
      <p class="affiliate-stat-label">Claimable</p>
      <p class="affiliate-stat-value" id="affiliateClaimableAmount">$0.00</p>
    </div>
  </div>

  <div class="affiliate-grid-2 affiliate-overview-meta">
    <div class="affiliate-stat-card">
      <div class="affiliate-data-list">
        <div class="affiliate-data-row">
          <span>Referral Code</span>
          <strong id="affiliateDashboardCode">—</strong>
        </div>
        <div class="affiliate-data-row">
          <span>Commission Rate</span>
          <strong id="affiliateDashboardCommissionRate">—</strong>
        </div>
        <div class="affiliate-data-row">
          <span>Customer Discount</span>
          <strong id="affiliateDashboardDiscountRate">—</strong>
        </div>
      </div>
    </div>

    <div class="affiliate-stat-card">
      <div class="affiliate-data-list">
        <div class="affiliate-data-row">
          <span>Paid Out</span>
          <strong id="affiliatePaidAmount">$0.00</strong>
        </div>
        <div class="affiliate-data-row">
          <span>Commission Timing</span>
          <strong>After Fulfilled / Shipped</strong>
        </div>
        <div class="affiliate-data-row">
          <span>Claim Method</span>
          <strong>Discord / Support</strong>
        </div>
      </div>
    </div>
  </div>
</section>
