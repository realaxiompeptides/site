<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Axiom Peptides | Product</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/menu.css" />
  <link rel="stylesheet" href="css/cart.css" />
  <link rel="stylesheet" href="css/product.css" />
  <link rel="stylesheet" href="footer/footer.css" />
</head>
<body>

  <div class="top-announcement-bar">
    <div class="top-announcement-track">
      <span class="announcement-item">🇺🇸 USA Fulfilled Orders</span>
      <span class="announcement-sep">|</span>
      <span class="announcement-item">🧪 Third-Party Lab Tested</span>
      <span class="announcement-sep">|</span>
      <span class="announcement-item">⭐ Trusted by 4,200+ Researchers</span>
    </div>
  </div>

  <header class="site-header">
    <div class="header-inner container">
      <button class="icon-btn hamburger-btn" id="menuToggle" aria-label="Open menu" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <a href="index.html" class="site-logo" aria-label="Axiom Peptides home">
        <img src="images/axiom-logo.PNG" alt="Axiom Peptides logo" />
      </a>

      <button class="icon-btn cart-btn" id="cartToggle" aria-label="Open cart" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2Zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2ZM7.17 14h9.96c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 21.58 5H6.21l-.94-2H2v2h2l3.6 7.59-1.35 2.44A1.98 1.98 0 0 0 6 16c0 1.1.9 2 2 2h12v-2H8l1.17-2Z"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <aside class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <div class="mobile-menu-inner">
      <div class="mobile-menu-header">
        <a href="index.html" class="mobile-menu-logo">
          <img src="images/axiom-menu-logo.PNG" alt="Axiom Peptides logo" />
        </a>
        <button class="drawer-close" id="menuClose" aria-label="Close menu" type="button">&times;</button>
      </div>

      <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-link"><span>Home</span><span class="mobile-nav-arrow">›</span></a>
        <a href="catalog.html" class="mobile-nav-link"><span>Products</span><span class="mobile-nav-arrow">›</span></a>
        <a href="track-order.html" class="mobile-nav-link"><span>Track Your Order</span><span class="mobile-nav-arrow">›</span></a>
        <a href="affiliate-program.html" class="mobile-nav-link"><span>Affiliate Program</span><span class="mobile-nav-arrow">›</span></a>
        <a href="contact.html" class="mobile-nav-link"><span>Contact Us</span><span class="mobile-nav-arrow">›</span></a>
      </nav>
    </div>
  </aside>

  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
    <div class="cart-drawer-inner">
      <div class="cart-drawer-header">
        <h2>Your Cart</h2>
        <button class="drawer-close" id="cartClose" aria-label="Close cart" type="button">&times;</button>
      </div>

      <div class="cart-body">
        <div class="cart-empty-state" id="cartEmptyState">
          <p class="cart-empty-text">Your cart is currently empty.</p>
          <a href="catalog.html" class="cart-pill-btn cart-outline-btn">Browse Products</a>
        </div>
        <div class="cart-items-list" id="cartItemsList" hidden></div>
      </div>

      <div class="cart-footer">
        <div class="cart-subtotal-row">
          <span>Subtotal</span>
          <strong id="cartSubtotal">$0.00</strong>
        </div>

        <div class="cart-action-stack">
          <a href="cart.html" class="cart-pill-btn cart-muted-btn">View Cart</a>
          <a href="checkout.html" class="cart-pill-btn cart-outline-btn">Checkout</a>
        </div>
      </div>
    </div>
  </aside>

  <div class="site-overlay" id="siteOverlay"></div>

  <main class="product-page">
    <section class="product-shell">
      <div class="container">
        <div class="product-grid-layout">
          <div class="product-gallery">
            <div class="product-main-image-wrap">
              <img id="productMainImage" src="" alt="" />
            </div>
            <div class="product-thumbs" id="productThumbs"></div>
          </div>

          <div class="product-info">
            <span class="product-badge" id="productBadge">SALE</span>
            <p class="product-subtitle" id="productSubtitle"></p>
            <h1 id="productTitle"></h1>

            <div class="product-price-wrap">
              <span class="product-old-price" id="productOldPrice"></span>
              <span class="product-price" id="productPrice"></span>
            </div>

            <p class="product-description" id="productDescription"></p>

            <div class="product-variant-block">
              <label for="productVariant">Choose Variant</label>
              <select id="productVariant"></select>
            </div>

            <div class="product-cta-row">
              <button class="product-add-btn" id="productAddToCart" type="button">Add To Cart</button>
            </div>

            <div class="product-meta-grid" id="productMetaGrid"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/menu.js" defer></script>
  <script src="js/cart.js" defer></script>
  <script src="js/product-page.js" defer></script>
  <script src="footer/footer-loader.js" defer></script>
</body>
</html>
